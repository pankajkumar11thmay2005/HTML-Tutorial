<!DOCTYPE html>
<html>

<head>
    <title>Header Tag</title>
    <style>
        h1, h3 {
        Color:#006400;
        Text-align:left;
        margin-bottom:0px;
        }
        p {
        font-size:25px;
        text-align:left;
        margin-top:0px;
        }
    </style>
</head>

<body>
    <article>
        <header>
            <h1>Pankaj Kumar</h1>
            <h3>Computer Science And Technology</h3>
            <p>i am a very bad student. Still  i do code for enjoment.</p>
        </header>
    </article>
</body>

</html>
