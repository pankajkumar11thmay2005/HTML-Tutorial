<!DOCTYPE html>
<html>
<head>
	<style>
		table {
			width: 100%;
			border-collapse: collapse;
		}
		th,
		td {
			border: 1px solid black;
			padding: 10px;
		}
		caption {
			font-size: 1.5em;
			margin-bottom: 10px;
		}
	</style>
</head>
<body>
	<table>
		<caption>Product Details</caption>
		<tr>
			<th>Product Name</th>
			<th>Price</th>
		</tr>
		<tr>
			<td>Smartphone</td>
			<td>$599</td>
		</tr>
		<tr>
			<td>Laptop</td>
			<td>$999</td>
		</tr>
	</table>
</body>
</html>
