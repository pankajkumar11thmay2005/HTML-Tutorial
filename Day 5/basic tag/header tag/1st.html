<!DOCTYPE html>
<html>
<head>
    <title>Header Example</title>
    <style>
        header { 
                 background: #4CAF50; 
                 color: white; 
                 padding: 0.5px; 
                 text-align: center; 
        }
        nav a { 
                color: white; 
                margin: 0 10px; 
                text-decoration: none; 
        }
    </style>
</head>
<body>

<header>
    <h1>My Website</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

</body>
</html>
