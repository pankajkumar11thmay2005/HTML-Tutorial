<!DOCTYPE html>
<html lang="en">
<head>
    <title></title>
    <style>
        body {
            text-align: center;
        }
        th,
        td {
            border: 1px solid #dddddd;
            padding: 8px;
        }
        table {
            margin: 10px auto;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1 style="color: green;"> pankajkumar </h1>
    <h2>Sample Table with <code>&lt;th&gt;</code> Tag </h2>
    <table>
        <tr>
            <th>Header 1</th>
            <th>Header 2</th>
            <th>Header 3</th>
        </tr>
        <tr>
            <td>Row 1, Cell 1</td>
            <td>Row 1, Cell 2</td>
            <td>Row 1, Cell 3</td>
        </tr>
        <tr>
            <td>Row 2, Cell 1</td>
            <td>Row 2, Cell 2</td>
            <td>Row 2, Cell 3</td>
        </tr>
    </table>
</body>
</html>
